# ============================================================
#  BudgetMate – application.properties
#  Replace all placeholder values (marked with <...>) before running
# ============================================================

# ----- Application -----
spring.application.name=BudgetMate
app.name=BudgetMate
app.frontend-url=http://localhost:3000

# ----- Server -----
server.port=8080
server.servlet.context-path=/

# ============================================================
#  PostgreSQL – Supabase
#  Connection string: Settings > Database > Connection string (JDBC)
#  Pattern: jdbc:postgresql://<host>:<port>/<db>?sslmode=require
# ============================================================
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.fpobhuumnwnzhnivyhzp
spring.datasource.password=budget@gang141
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' or 'none' in production; 'update' for local dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
#  JWT
#  Generate a secure Base64-encoded secret (≥32 bytes):
#    openssl rand -base64 64
# ============================================================
app.jwt.secret=BudgetMateAppSuperSecretKeyForJWTTokenSigningAndValidation2024!#$
app.jwt.expiration-ms=2592000000

# ============================================================
#  Google OAuth2
#  Credentials: https://console.cloud.google.com/apis/credentials
#  Authorised redirect URI: http://localhost:8080/login/oauth2/code/google
# ============================================================
spring.security.oauth2.client.registration.google.client-id=<google-client-id>
spring.security.oauth2.client.registration.google.client-secret=<google-client-secret>
spring.security.oauth2.client.registration.google.scope=email,profile

# After OAuth2 success, redirect the user to this frontend URL with ?token=<jwt>
app.oauth2.authorized-redirect-uri=http://localhost:3000/oauth2/redirect
# Mobile OAuth2 callback deep-link with ?token=<jwt> or ?error=<message>
app.oauth2.mobile-authorized-redirect-uri=budgetmate://oauth2/redirect

# ============================================================
#  SMTP – Email Notifications
#  Example using Gmail app password
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=<your-gmail-address>
spring.mail.password=<gmail-app-password>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
#  Exchange Rate API  (https://www.exchangerate-api.com/)
# ============================================================
app.exchange-rate.api-url=https://v6.exchangerate-api.com/v6
app.exchange-rate.api-key=<exchange-rate-api-key>

# ----- Caching (simple in-memory) -----
spring.cache.type=simple

# ============================================================
#  WebSocket
# ============================================================
# WebSocket endpoint: ws://localhost:8080/ws  (or SockJS at /ws)
# Dashboard topic:    /topic/dashboard/{userId}

# ============================================================
#  Logging
# ============================================================
logging.level.root=INFO
logging.level.edu.cit.delacruz.campusclinic=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

# ----- Jackson -----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
